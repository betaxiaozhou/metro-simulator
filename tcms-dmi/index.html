<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1024,initial-scale=1" />
  <title>列车监控 TCMS</title>
  <style>
    :root{
      --w:1024px;
      --h:768px;
      --green:#79ff00;
      --green-d:#43b800;
      --grid:#e5e8dd;
      --panel:#0f2336;
      --panel-d:#081522;
      --dark:#00182e;
      --blue:#789cff;
      --yellow:#f7df00;
      --orange:#f68b24;
      --text:#f5f5ed;
      --muted:#d6d8cf;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#1a1a1a;
      color:var(--text);
      font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;
      user-select:none;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .simulator { display: flex; gap: 20px; transform: scale(0.85); transform-origin: center center; }

    /* 控制台样式 */
    .control-panel {
        width: 480px; background-color: #222; border-radius: 8px; padding: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column;
        gap: 10px; border: 1px solid #444; height: 768px; box-sizing: border-box; overflow-y: auto;
    }
    .control-panel h2 { margin: 0 0 5px 0; font-size: 18px; border-bottom: 2px solid #555; padding-bottom: 5px; color: #fff;}
    .ctrl-group { background: #111; padding: 10px; border-radius: 6px; border: 1px solid #333; }
    .ctrl-group h3 { margin: 0 0 8px 0; font-size: 14px; color: var(--blue); border-bottom: 1px solid #333; padding-bottom: 4px;}
    .ctrl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
    .ctrl-item { display: flex; align-items: center; justify-content: space-between; }
    .ctrl-item label { font-size: 11px; color: #ccc; width: 65px; flex-shrink: 0; }
    .ctrl-item input[type="text"], .ctrl-item select { flex: 1; width: 100%; background: #333; color: white; border: 1px solid #555; padding: 4px; border-radius: 3px; font-size: 12px;}
    .slider-row { display: flex; flex-direction: column; margin-bottom: 5px;}
    .slider-row div { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; color: #ccc;}
    .slider-row input { width: 100%; cursor: pointer;}
    button { background: #444; color: white; border: 1px solid #666; padding: 8px; border-radius: 4px; cursor: pointer; }

    /* 嵌入 metro-simulator：仅 DMI，隐藏调试面板 */
    html.tcms-embed-root, body.tcms-embed {
        height: 100%;
        margin: 0;
        overflow: hidden;
        background-color: rgb(0, 12, 25);
    }
    body.tcms-embed {
        display: block;
        padding: 0;
    }
    body.tcms-embed .simulator {
        gap: 0;
        transform: none;
        transform-origin: top left;
        width: 100%;
        min-height: 0;
    }
    body.tcms-embed #mock-panel { display: none !important; }
    body.tcms-embed .tcms {
        transform-origin: top left;
    }
    body.tcms-embed #tcms-embed-wrap {
        margin: 0 auto;
        max-width: 100%;
        box-sizing: border-box;
    }
    .tcms{
      width:var(--w);
      height:var(--h);
      position:relative;
      overflow:hidden;
      background:rgb(0,12,25);
      border:none;
      box-shadow:inset 0 0 0 4px #000;
      transform-origin:top left;
    }
    .layout{
      display:grid;
      width:1024px;
      height:768px;
      grid-template-columns:148px 141px 141px 57px 85px 50px 96px 103px 47px 56px 100px;
      grid-template-rows:46.389px 76.285px 280.397px 179.369px 61.852px 54.638px 69.070px;
    }
    .zone{
      position:relative;
      background:rgb(0,12,25);
      overflow:hidden;
    }
    .zone::after{
      content:attr(data-zone);
      position:absolute;
      right:6px;
      bottom:4px;
      color:rgba(255,255,255,.08);
      font-size:10px;
      font-weight:900;
      pointer-events:none;
    }
    .z1{grid-area:1/1/2/12}
    .z2{grid-area:2/1/3/2}
    .z3{grid-area:2/2/3/3}
    .z4{grid-area:2/3/3/4}
    .z5{grid-area:2/4/3/6}
    .z6{grid-area:2/6/3/8}
    .z7{grid-area:2/8/3/11}
    .z8{grid-area:2/11/3/12}
    .z9{grid-area:3/1/4/12}
    .z10{grid-area:4/1/5/10}
    .z11{grid-area:5/1/6/10}
    .z12a{grid-area:4/10/6/12}
    .z15{grid-area:6/1/7/5}
    .z12b{grid-area:6/5/7/7}
    .z13{grid-area:6/7/7/9}
    .z14{grid-area:6/9/7/12}
    .z16{grid-area:7/1/8/12}

    .header{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      height:100%;
      padding:0 16px;
      color:#e8ede4;
      font-size:18px;
      font-weight:700;
      font-family:"SimSun","Songti SC",STSong,"NSimSun",serif;
    }
    .header .train-id{
      position:relative;
      z-index:1;
      white-space:nowrap;
      font-size:24px;
    }
    .header .title{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      margin:0;
      font-family:"SimSun","Songti SC",STSong,"NSimSun",serif;
      font-size:24px;
      font-weight:700;
      white-space:nowrap;
      pointer-events:none;
    }
    .status-cell{
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:2px;
      text-align:center;
      color:#eef1e8;
    }
    .gray-box{
      width:116px;
      height:62px;
      background:#6b7c94;
      display:flex;
      align-items:center;
      justify-content:flex-end;
      padding-right:8px;
    }
    .half-box{
      width:139px;
      height: 30px;
      background:#6b7c94;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .z2.status-cell{
      align-items:flex-end;
      padding-right:1px;
    }
    .power .gray-box, .speed .gray-box{
      flex-direction:row;
      gap:8px;
      font-variant-numeric:tabular-nums;
      font-feature-settings:"tnum";
      font-family:"Arial","Helvetica Neue","Microsoft YaHei","PingFang SC",sans-serif;
    }
    .status-cell .lab{
      color:#fff;
      font-size:22px;
      font-weight:600;
      letter-spacing:1px;
    }
    .status-cell .val{
      color:#fff;
      font-size:22px;
      font-weight:600;
      line-height:1.05;
    }
    .z3.status-cell, .z4.status-cell{
      font-family:"SimSun","Songti SC",STSong,"NSimSun",serif;
    }
    .power{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      height:100%;
      font-weight:900;
    }
    .z5.power{
      justify-content:flex-start;
      padding-left:2px;
    }
    .power .minus{
      color:var(--green);
      font-size:34px;
      line-height:1;
    }
    .power .amp{
      min-width:70px;
      color:var(--green);
      font-size:44px;
      font-weight:300;
      text-align:right;
    }
    .power .unit{align-self:flex-end;margin-bottom:17px;color:#fff;font-size:18px}
    .speed{
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      color:var(--green);
      font-weight:900;
    }
    .speed .num{
      font-size:46px;
      font-weight:300;
    }
    .speed .decimal-dot{
      display:inline-block;
      width:5px;
      height:5px;
      margin:0 0px 0px;
      border-radius:50%;
      background:currentColor;
      vertical-align:baseline;
    }
    .speed .unit{align-self:flex-end;margin-bottom:17px;color:#fff;font-size:18px}
    .side-ind{
      height:100%;
      display:grid;
      place-items:center;
    }

    .train-area{
      padding:40px 0 2px 0;
      border-top:2px solid var(--grid);
      display:flex;
      justify-content:flex-start;
      gap:4px;
    }
    .left-bar{
      width:26px;
      background:#6b7c94;
      box-shadow:inset 1px 1px 0 rgba(255,255,255,0.6);
    }
    .right-bar{
      width:26px;
      background:#f68b24;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:inset 1px 1px 0 rgba(255,255,255,0.8);
    }
    .right-bar .arrow{
      width:0;
      height:0;
      border-top:10px solid transparent;
      border-bottom:10px solid transparent;
      border-left:16px solid #79ff00;
    }
    .main-cars{
      width:942px;
      position:relative;
    }
    .pantographs{
      position:absolute;
      top:-36px;
      left:0;
      right:0;
      display:grid;
      grid-template-columns:repeat(8, minmax(0, 1fr));
      gap:4px;
      pointer-events:none;
    }
    .panto{
      justify-self:center;
      width:28px;
      height:28px;
      border:2px solid var(--green-d);
      color:var(--green);
      display:grid;
      place-items:center;
      font-size:20px;
      font-weight:900;
      line-height:1;
      background:rgba(121,255,0,.16);
    }
    .cars{
      display:grid;
      grid-template-columns:repeat(8, minmax(0, 1fr));
      height:100%;
      gap:4px;
    }
    .car{
      position:relative;
      border:2px solid var(--grid);
      padding:4px;
      background:rgba(8,34,58,.72);
    }
    .car-name{
      position:absolute;
      top:100px;
      left:0;
      right:0;
      color:#fff;
      text-align:center;
      font-family:Georgia,serif;
      font-size:14px;
      font-weight:800;
    }
    .device-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      min-height:22px;
      padding:0;
    }
    .device-row.top-status{
      justify-content:center;
      min-height:16px;
      margin-bottom:2px;
      position:absolute;
      top:26px;
      left:0;
      right:0;
    }
    .device-row.mid-row{
      position:absolute;
      top:54px;
      left:4px;
      right:4px;
    }
    .device-row.lower-row{
      position:absolute;
      top:130px;
      left:4px;
      right:4px;
    }
    .chip,.round{
      background:#79ff00;
      color:#268000;
      border:1px solid #50b000;
      font-weight:900;
      text-align:center;
      white-space:nowrap;
    }
    .chip{
      min-width:20px;
      border-radius:4px;
      padding:1px 2px;
      font-size:9px;
      line-height:1;
    }
    .round{
      min-width:24px;
      min-height:16px;
      border-radius:999px;
      padding:2px 3px;
      font-size:10px;
      line-height:12px;
    }
    .round.big{
      min-width:22px;
      min-height:22px;
      border-radius:50%;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      padding:0;
    }
    .round.small{
      min-width:18px;
      min-height:18px;
      border-radius:50%;
      padding:0;
      font-size:10px;
    }
    .muted{
      background:#d5d8d0;
      color:#8b9289;
      box-shadow:none;
      border-color:#c5c9c0;
    }
    .door-band{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:1px;
      margin-bottom:4px;
    }
    .door-band.bottom{
      position:absolute;
      left:4px;
      right:4px;
      bottom:4px;
      margin:0;
    }
    .door{
      height:19px;
      display:grid;
      place-items:center;
      color:#30a000;
      font-size:10px;
      font-weight:800;
      background:#79ff00;
      border:1px solid #56b900;
    }
    .door.open{
      color:#712500;
      background:#f68b24;
      border-color:#c76716;
    }
    .subtle{
      position:absolute;
      top:108px;
      left:0;
      right:0;
      color:#79ff00;
      font-family:Georgia,serif;
      font-size:14px;
      font-weight:800;
      text-align:center;
    }

    .table-wrapper{
      position:absolute;
      inset:0px 0px 2px 64px;
      display:flex;
      align-items:stretch;
      justify-content:stretch;
    }
    .error-box{
      position:absolute;
      inset:0px 0px 2px 64px;
      border:2px solid #fff;
      display:flex;
      align-items:center;
      padding:0 10px;
      font-family:"Consolas","Menlo",monospace;
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
    }
    .status-table{
      width:100%;
      border-collapse:collapse;
      table-layout:fixed;
      border:2px solid #fff;
      color:#fff;
      font-size:14px;
      font-weight:800;
      text-align:center;
    }
    .status-table .label-col{
      width:160px;
    }
    .status-table .data-col{
      width:calc((100% - 160px) / 8);
    }
    .status-table td{
      border:1px solid #fff;
      padding:2px 4px;
      height:32px;
      overflow:hidden;
      text-overflow:clip;
      white-space:nowrap;
    }
    .status-table .tlabel{
      font-size:15px;
      white-space:nowrap;
    }
    .status-table .ok-cell{
      background:#79ff00;
      color:#001a08;
    }
    .status-table .err-cell{
      background:#f4432f;
      color:#fff;
    }
    .gauge-zone{
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .force-meter{
      width:150px;
      height:185px;
      position:relative;
      color:#fff;
      font-weight:900;
      transform:scale(.88);
      transform-origin:center;
    }
    .force-label{
      position:absolute;
      left:0;
      width:48px;
      text-align:right;
      font-size:22px;
      line-height:1;
    }
    .force-label.top{top:-6px}
    .force-label.mid{top:78px}
    .force-label.bottom{bottom:-6px}
    .force-tick{
      position:absolute;
      left:58px;
      width:24px;
      height:2px;
      background:#fff;
    }
    .force-tick.top{top:4px}
    .force-tick.mid{top:91px}
    .force-tick.bottom{bottom:4px}
    .force-box{
      position:absolute;
      left:82px;
      top:4px;
      width:36px;
      height:177px;
    }
    .force-frame{
      position:absolute;
      inset:0;
      border:2px solid #fff;
      background:transparent;
      z-index:3;
    }
    .force-short-tick{
      position:absolute;
      left:68px;
      width:14px;
      height:2px;
      background:#fff;
    }
    .force-short-tick.q75{top:48px}
    .force-short-tick.q25{top:135px}
    .force-bar{
      position:absolute;
      left:2px;
      right:2px;
      top:2px;
      bottom:2px;
      overflow:hidden;
      z-index:2;
    }
    .force-fill{
      position:absolute;
      left:0;
      bottom:0;
      width:100%;
      height:0;
      background:#f4432f;
    }
    .force-fill.traction{
      background:#79ff00;
    }
    .info-row{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      height:100%;
    }
    .info-card{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      border-right:2px solid var(--grid);
      color:#fff;
      font-size:17px;
      font-weight:900;
    }
    .mini-light{
      min-width:62px;
      padding:3px 8px;
      border-radius:4px;
      background:#79ff00;
      color:#289000;
      border:1px solid #50b000;
      text-align:center;
    }
    .footer-row{
      display:grid;
      grid-template-columns:repeat(8,1fr);
      gap:6px;
      padding:7px 10px;
      border-top:2px solid var(--grid);
    }
    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      height:42px;
      color:#efe8bf;
      background:#789cff;
      border:2px solid #d7e0ff;
      font-size:22px;
      font-weight:800;
      letter-spacing:1px;
    }
    .btn.active{
      color:#9b7200;
      background:#f7df00;
      border-color:#ffe97a;
    }
    .value-green{color:var(--green)}
    .value-blue{color:#dce4ff}
  </style>
</head>
<body>
<div class="simulator">
  <main class="tcms" aria-label="列车监控 TCMS" id="dmi-main">
    <section class="layout">
      <div class="zone z1 header" data-zone="1">
        <div class="train-id">编组: <span id="trainNo">19005(Tc2)</span></div>
        <div class="title">运行</div>
      </div>
      <div class="zone z2 status-cell" data-zone="2">
        <div class="half-box"><div class="val" id="dateText">2026-04-29</div></div>
        <div class="half-box"><div class="val" id="timeText">17:21:57</div></div>
      </div>
      <div class="zone z3 status-cell" data-zone="3">
        <div class="half-box"><div class="lab">下一站</div></div>
        <div class="half-box"><div class="val" id="nextStation">积水潭</div></div>
      </div>
      <div class="zone z4 status-cell" data-zone="4">
        <div class="half-box"><div class="lab">终点站</div></div>
        <div class="half-box"><div class="val" id="terminalStation">牡丹园</div></div>
      </div>
      <div class="zone z5 power" data-zone="5">
        <div class="gray-box"><span class="minus" id="currentSign">−</span><span class="amp" id="currentA">0</span></div><span class="unit">A</span>
      </div>
      <div class="zone z6 power" data-zone="6">
        <div class="gray-box"><span class="amp" id="lineV">750</span></div><span class="unit">V</span>
      </div>
      <div class="zone z7 speed" data-zone="7">
        <div class="gray-box"><span class="num" id="speedKmh">0<span class="decimal-dot"></span>0</span></div><span class="unit">km/h</span>
      </div>
      <div class="zone z8 side-ind" data-zone="8"></div>

      <div class="zone z9 train-area" data-zone="9">
        <div class="left-bar"></div>
        <div class="main-cars">
          <div class="pantographs">
            <div class="panto" style="opacity:0">∑</div><div class="panto">∑</div><div class="panto" style="opacity:0">∑</div><div class="panto">∑</div>
            <div class="panto" style="opacity:0">∑</div><div class="panto" style="opacity:0">∑</div><div class="panto">∑</div><div class="panto" style="opacity:0">∑</div>
          </div>
          <div class="cars" id="cars"></div>
        </div>
        <div class="right-bar"><div class="arrow"></div></div>
      </div>

      <div class="zone z10" data-zone="10">
        <div class="table-wrapper">
          <table class="status-table" id="statusTable"></table>
        </div>
      </div>
      <div class="zone z11" data-zone="11">
        <div class="error-box" id="tcmsLog"></div>
      </div>
      <div class="zone z12a gauge-zone" data-zone="12">
        <div class="force-meter" aria-label="牵引制动力百分比">
          <span class="force-label top">100</span>
          <span class="force-label mid">50</span>
          <span class="force-label bottom">0</span>
          <span class="force-tick top"></span>
          <span class="force-tick mid"></span>
          <span class="force-tick bottom"></span>
          <span class="force-short-tick q75"></span>
          <span class="force-short-tick q25"></span>
          <span class="force-box">
            <span class="force-bar"><span class="force-fill" id="forceFill"></span></span>
            <span class="force-frame"></span>
          </span>
        </div>
      </div>
      <div class="zone z15 info-row" data-zone="15">
        <div class="info-card"><span>门</span><span class="mini-light" id="doorState">全关</span></div>
        <div class="info-card"><span>模式</span><span class="mini-light" id="modeState">RM</span></div>
        <div class="info-card"><span>受流</span><span class="mini-light" id="railState">正常</span></div>
      </div>
      <div class="zone z12b info-card" data-zone="12">常用制动-<span id="brakePct">0</span>%</div>
      <div class="zone z13 info-card" data-zone="13">空调 <span class="mini-light" id="acState">关</span></div>
      <div class="zone z14 info-card" data-zone="14">牵引 <span class="mini-light" id="tractionPct">0%</span></div>
      <div class="zone z16 footer-row" data-zone="16">
        <div class="btn">自检</div>
        <div class="btn">广播</div>
        <div class="btn">旁路信息</div>
        <div class="btn">烟火报警</div>
        <div class="btn active">AM模式</div>
        <div class="btn">全自动报站</div>
        <div class="btn">帮助</div>
        <div class="btn">检修</div>
      </div>
    </section>
  </main>

  <div class="control-panel" id="mock-panel">
      <h2>TCMS 打桩调试器</h2>
      <div class="ctrl-group">
          <h3>基础状态</h3>
          <div class="slider-row">
              <div><span>速度: <span id="v-speed">0.0</span> km/h</span></div>
              <input type="range" id="c-speedKmh" min="0" max="110" step="0.1" value="0">
          </div>
          <div class="slider-row">
              <div><span>网压: <span id="v-lineV">750</span> V</span></div>
              <input type="range" id="c-lineV" min="0" max="1000" step="1" value="750">
          </div>
          <div class="slider-row">
              <div><span>电流: <span id="v-motorCurrentA">0</span> A</span></div>
              <input type="range" id="c-motorCurrentA" min="-1000" max="1000" step="1" value="0">
          </div>
          <div class="slider-row">
              <div><span>牵引级位: <span id="v-trPct">0</span> %</span></div>
              <input type="range" id="c-trPct" min="0" max="100" step="1" value="0">
          </div>
          <div class="slider-row">
              <div><span>制动级位: <span id="v-bkPct">0</span> %</span></div>
              <input type="range" id="c-bkPct" min="0" max="100" step="1" value="0">
          </div>
          <div class="slider-row">
              <div><span>主风缸压力: <span id="v-mrPress">900</span> kPa</span></div>
              <input type="range" id="c-mrPress" min="0" max="1200" step="10" value="900">
          </div>
          <div class="slider-row">
              <div><span>制动缸压力: <span id="v-bcPress">0</span> kPa</span></div>
              <input type="range" id="c-bcPress" min="0" max="600" step="10" value="0">
          </div>
      </div>
      <div class="ctrl-group">
          <h3>设备状态</h3>
          <div class="ctrl-grid">
              <div class="ctrl-item"><label>模式</label>
                  <select id="c-mode">
                      <option value="RM" selected>RM</option>
                      <option value="AM">AM</option>
                      <option value="CM">CM</option>
                      <option value="FAM">FAM</option>
                      <option value="ATB">ATB</option>
                  </select>
              </div>
              <div class="ctrl-item"><label>受流</label><select id="c-keyOn"><option value="true" selected>正常</option><option value="false">断电</option></select></div>
              <div class="ctrl-item"><label>空调</label><select id="c-ac"><option value="false" selected>关</option><option value="true">开</option></select></div>
              <div class="ctrl-item"><label>紧急制动</label><select id="c-ebActive"><option value="false" selected>已建立 (正常)</option><option value="true">未建立 (EB)</option></select></div>
              <div class="ctrl-item" style="grid-column: span 2;"><label>车门状态</label>
                  <select id="c-doorOpenSide">
                      <option value="none" selected>全关</option>
                      <option value="left">左开</option>
                      <option value="right">右开</option>
                      <option value="both">双开</option>
                  </select>
              </div>
              <div class="ctrl-item"><label>编组</label><input type="text" id="c-trainNo" value="19005(Tc2)"></div>
              <div class="ctrl-item"><label>下一站</label><input type="text" id="c-nextStation" value="积水潭"></div>
              <div class="ctrl-item"><label>终点站</label><input type="text" id="c-terminalStation" value="牡丹园"></div>
          </div>
      </div>
      <div class="ctrl-group">
          <h3>消息注入</h3>
          <div class="ctrl-grid">
              <div class="ctrl-item" style="grid-column: span 2;">
                  <input type="text" id="c-logMsg" placeholder="输入日志消息...">
              </div>
              <div class="ctrl-item">
                  <select id="c-logLevel">
                      <option value="info">Info</option>
                      <option value="ok">OK</option>
                      <option value="err">Error</option>
                  </select>
              </div>
              <div class="ctrl-item">
                  <button type="button" id="btn-send-log" style="width:100%">发送日志</button>
              </div>
          </div>
      </div>
  </div>
</div>

  <script>
    const CAR_NAMES = ["Tc1","Mp1","M1","Mp3","M3","M2","Mp2","Tc2"];
    const OCC = [27,35,21,14,16,18,20,12];
    const TEMP = [21,21,23,22,23,22,21,22];
    const $ = (id) => document.getElementById(id);
    const fmt = (n, digits = 0) => Number(n || 0).toFixed(digits);
    let lastData = {};

    function fitScreen() {
      const scale = Math.min(window.innerWidth / 1024, window.innerHeight / 768);
      document.querySelector(".tcms").style.transform = `scale(${scale})`;
    }

    function buildCars() {
      $("cars").innerHTML = CAR_NAMES.map((name, i) => {
        const start = i + 1;
        const topDoors = Array.from({length:5}, (_, j) => `<div class="door" data-door="${i}-${j}">B${start}${j + 1}</div>`).join("");
        const bottomDoors = Array.from({length:5}, (_, j) => `<div class="door" data-door-b="${i}-${j}">A${start}${j + 1}</div>`).join("");
        
        let leftTop = "", rightTop = "", leftMid = "", rightMid = "", onLabel = "";
        
        if (name === "Tc1") {
          leftTop = '<span class="round big muted">M</span>';
          rightTop = '<span class="round big">(B)</span>';
          leftMid = '<span class="chip">EXIT</span><br><span class="round" style="margin-top:2px">SIV</span>';
        } else if (name === "Tc2") {
          leftTop = '<span class="round big muted">M</span>';
          rightTop = '<span class="round big">(B)</span>';
          rightMid = '<span class="chip">EXIT</span><br><span class="round" style="margin-top:2px">SIV</span>';
        } else {
          leftTop = '<span class="round">HSCB</span>';
          rightTop = '<span class="round big">(B)</span>';
          leftMid = '<span class="round small">V</span>';
          
          if (name === "Mp1" || name === "Mp3" || name === "Mp2") {
            onLabel = '<span class="chip">on</span>';
          }
          if (name === "M1" || name === "Mp3" || name === "M3" || name === "M2") {
            rightMid = '<span class="round">SIV</span>';
          }
        }

        return `
          <div class="car">
            <div class="door-band">${topDoors}</div>
            <div class="device-row top-status">${onLabel}</div>
            <div class="device-row mid-row">
              <div style="text-align:center">${leftTop}</div>
              <div style="text-align:center">${rightTop}</div>
            </div>
            <div class="device-row lower-row" style="align-items:flex-start">
              <div style="text-align:center">${leftMid}</div>
              <div style="text-align:center">${rightMid}</div>
            </div>
            <div class="car-name">${name}</div>
            <div class="subtle">(Pk)</div>
            <div class="device-row" style="position:absolute;bottom:32px;left:4px"><span class="chip">BCM</span></div>
            <div class="door-band bottom">${bottomDoors}</div>
          </div>`;
      }).join("");
    }

    function buildTable(data = {}) {
      const mr = data.mrPress ?? 900;
      const bc = data.bcPress ?? 0;
      const motorA = data.motorCurrentA ?? 0;
      const trPct = data.trPct ?? 0;
      const bkPct = data.bkPct ?? 0;
      const motorKn = Math.abs(motorA) > 8 ? Math.max(12, Math.abs(motorA) / 26) : 0;
      
      const r1c2 = fmt(mr);
      const r1c3 = fmt(mr - 2);
      const safeClass = data.ebActive ? "err-cell" : "ok-cell";
      const safeText = data.ebActive ? "未建立" : "已建立";
      
      let html = `
        <colgroup>
          <col class="label-col">
          <col class="data-col">
          <col class="data-col">
          <col class="data-col">
          <col class="data-col">
          <col class="data-col">
          <col class="data-col">
          <col class="data-col">
          <col class="data-col">
        </colgroup>
        <tr>
          <td class="tlabel">主风缸压力(kPa)</td>
          <td>${r1c2}</td>
          <td>${r1c3}</td>
          <td colspan="2" class="tlabel">空转/滑行</td>
          <td></td>
          <td colspan="2" class="tlabel">牵引安全</td>
          <td class="${safeClass}">${safeText}</td>
        </tr>
      `;
      
      html += `<tr><td class="tlabel">制动缸压力(kPa)</td>` + CAR_NAMES.map(() => `<td>${fmt(bc)}</td>`).join("") + `</tr>`;
      html += `<tr><td class="tlabel">牵引/电制动力(kN)</td>` + CAR_NAMES.map((n) => `<td>${n.startsWith("Tc") ? "--" : fmt(motorKn * (trPct ? 1 : -1), 2)}</td>`).join("") + `</tr>`;
      html += `<tr><td class="tlabel">乘客率(%)</td>` + OCC.map(v => `<td>${v}</td>`).join("") + `</tr>`;
      html += `<tr><td class="tlabel">客室温度(℃)</td>` + TEMP.map(v => `<td>${fmt(v, 1)}</td>`).join("") + `</tr>`;
      
      $("statusTable").innerHTML = html;
    }

    function doorLabel(side) {
      if (side === "both") return "双开";
      if (side === "left") return "左开";
      if (side === "right") return "右开";
      return "全关";
    }

    function updateDoors(side) {
      document.querySelectorAll(".door").forEach((el) => el.classList.toggle("open", side === "left" || side === "both"));
      document.querySelectorAll(".door-band.bottom .door").forEach((el) => el.classList.toggle("open", side === "right" || side === "both"));
    }

    function applyData(data) {
      lastData = {...lastData, ...data};
      $("trainNo").textContent = data.trainNo || "19005(Tc2)";
      $("dateText").textContent = data.date || new Date().toISOString().slice(0, 10);
      $("timeText").textContent = data.time || new Date().toTimeString().slice(0, 8);
      $("nextStation").textContent = data.nextStation || "积水潭";
      $("terminalStation").textContent = data.terminalStation || "牡丹园";
      $("currentSign").textContent = (data.motorCurrentA ?? 0) < -0.5 ? "−" : "";
      $("currentA").textContent = fmt(Math.abs(data.motorCurrentA ?? 0));
      $("lineV").textContent = fmt(data.lineV ?? 750);
      $("speedKmh").innerHTML = fmt(data.speedKmh ?? 0, 1).replace(".", `<span class="decimal-dot"></span>`);
      $("doorState").textContent = doorLabel(data.doorOpenSide);
      $("modeState").textContent = data.mode || "RM";
      $("railState").textContent = data.keyOn === false ? "断电" : "正常";
      $("brakePct").textContent = fmt(data.bkPct ?? 0);
      $("acState").textContent = data.ac ? "on" : "关";
      $("tractionPct").textContent = `${fmt(data.trPct ?? 0)}%`;
      const forceFill = $("forceFill");
      if (forceFill) {
        const tr = Math.max(0, Math.min(100, data.trPct ?? 0));
        const bk = Math.max(0, Math.min(100, data.bkPct ?? 0));
        const traction = tr >= bk;
        forceFill.classList.toggle("traction", traction);
        forceFill.style.height = `${Math.max(tr, bk)}%`;
      }
      updateDoors(data.doorOpenSide || "none");
      buildTable(data);
    }

    function appendLog(message, type = "info") {
      const logEl = $("tcmsLog");
      if (logEl) {
        const prefix = new Date().toTimeString().slice(0, 8);
        logEl.textContent = `[${prefix}] ${message}`;
        logEl.style.color = type === "err" ? "#ffd0d0" : type === "ok" ? "#dcffe1" : "#e5f0ff";
      }
    }

    window.addEventListener("message", (event) => {
      const msg = event.data || {};
      if (msg.type === "metro-tcms-log") {
        appendLog(msg.message, msg.level);
        return;
      }
      if (msg.type !== "metro-tcms-dmi") return;
      const state = msg.state;
      if (!state || typeof state !== "object") return;
      try {
        for (const [id, val] of Object.entries(state)) {
          const el = document.getElementById("c-" + id);
          if (!el || !("value" in el)) continue;
          el.value = String(val);
        }
      } catch (err) { console.warn("metro-tcms-dmi apply", err); }
      syncMockToTCMS();
    });

    function syncMockToTCMS() {
      const data = {
        speedKmh: parseFloat($("c-speedKmh").value),
        lineV: parseFloat($("c-lineV").value),
        motorCurrentA: parseFloat($("c-motorCurrentA").value),
        trPct: parseFloat($("c-trPct").value),
        bkPct: parseFloat($("c-bkPct").value),
        mrPress: parseFloat($("c-mrPress").value),
        bcPress: parseFloat($("c-bcPress").value),
        mode: $("c-mode").value,
        keyOn: $("c-keyOn").value === "true",
        ac: $("c-ac").value === "true",
        ebActive: $("c-ebActive").value === "true",
        doorOpenSide: $("c-doorOpenSide").value,
        trainNo: $("c-trainNo").value,
        nextStation: $("c-nextStation").value,
        terminalStation: $("c-terminalStation").value
      };
      
      $("v-speed").textContent = data.speedKmh.toFixed(1);
      $("v-lineV").textContent = data.lineV;
      $("v-motorCurrentA").textContent = data.motorCurrentA;
      $("v-trPct").textContent = data.trPct;
      $("v-bkPct").textContent = data.bkPct;
      $("v-mrPress").textContent = data.mrPress;
      $("v-bcPress").textContent = data.bcPress;

      applyData(data);
    }

    $("mock-panel").addEventListener("input", syncMockToTCMS);
    $("mock-panel").addEventListener("change", syncMockToTCMS);

    $("btn-send-log").addEventListener("click", () => {
      const msg = $("c-logMsg").value;
      const level = $("c-logLevel").value;
      if (msg) {
        appendLog(msg, level);
      }
    });

    buildCars();
    buildTable();
    applyData({});
    
    /* metro-simulator 嵌入：由父页面下发状态并刷新 DMI */
    (function embedMetro() {
        const p = new URLSearchParams(location.search);
        if (p.get("embed") === "1") {
            document.documentElement.classList.add("tcms-embed-root");
            document.body.classList.add("tcms-embed");
            const dmi = document.getElementById("dmi-main");
            const sim = document.querySelector(".simulator");
            if (dmi && sim && !document.getElementById("tcms-embed-wrap")) {
                const wrap = document.createElement("div");
                wrap.id = "tcms-embed-wrap";
                wrap.style.overflow = "hidden";
                wrap.style.margin = "0 auto";
                sim.insertBefore(wrap, dmi);
                wrap.appendChild(dmi);
            }
            const wrap = document.getElementById("tcms-embed-wrap");
            const DMI_NAT_W = 1024;
            const DMI_NAT_H = 768;
            const scale = () => {
                const iw = window.innerWidth || DMI_NAT_W;
                const ih = window.innerHeight || DMI_NAT_H;
                const s = Math.min(iw / DMI_NAT_W, ih / DMI_NAT_H);
                const inv = 1 - s;
                if (wrap) {
                    wrap.style.width = Math.round(DMI_NAT_W * s) + "px";
                    wrap.style.height = Math.round(DMI_NAT_H * s) + "px";
                    wrap.style.overflow = "hidden";
                    wrap.style.marginLeft = "auto";
                    wrap.style.marginRight = "auto";
                }
                if (dmi) {
                    dmi.style.transform = `scale(${s})`;
                    dmi.style.transformOrigin = "top left";
                    dmi.style.marginBottom = "-" + Math.round(DMI_NAT_H * inv) + "px";
                    dmi.style.marginRight = "-" + Math.round(DMI_NAT_W * inv) + "px";
                }
            };
            scale();
            window.addEventListener("resize", scale);
        }
    })();

    setInterval(() => {
      if (!lastData.time) $("timeText").textContent = new Date().toTimeString().slice(0, 8);
    }, 1000);

    syncMockToTCMS();
  </script>
</body>
</html>
