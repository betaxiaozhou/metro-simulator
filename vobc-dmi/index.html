<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>车载信号人机界面</title>
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        .simulator { display: flex; gap: 20px; transform: scale(0.85); transform-origin: center center; }

        /* 左侧 DMI：内容区精确 1024×768（4:3）；画框用 inset 阴影避免 border 吃掉内容比例 */
        .dmi-container {
            box-sizing: border-box;
            width: 1024px;
            height: 768px;
            background-color: rgb(0, 12, 25);
            display: flex;
            flex-direction: column;
            border: none;
            box-shadow:
                inset 0 0 0 4px #000,
                0 10px 40px rgba(0,0,0,0.8);
            transition: opacity 0.5s ease;
        }
        
        .dmi-sleep { opacity: 0.1; pointer-events: none; }

        .row { display: flex; width: 100%; }
        .zone {
            box-sizing: border-box; border: none;
            display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden;
        }

        /* 严格国标颜色 */
        .c-red { color: rgb(189, 0, 0); } 
        .c-yellow { color: rgb(255, 242, 0); }
        .c-green { color: rgb(45, 144, 51); } 
        .c-blue { color: rgb(37, 151, 230); }
        .c-gray { color: rgb(212, 212, 212); }

        .val { font-size: 26px; font-weight: bold; z-index: 2; text-align: center; width: 100%;}
        .label { color: rgb(37, 151, 230); font-size: 22px; z-index: 2;}

        /* 分区高度定义（r1–r4 合计 = 768，配合 1024×768 的 4:3 屏）
           横行宽度核验：127+290+290+317=1024；662+362=1024；127+534+?=662→127+535=662 */
        .r1 { height: 98px; } .r2 { height: 427px; } .r3 { height: 85px; } .r4 { height: 158px; }
        .row.r2 { align-items: stretch; min-height: 0; }
        .z1 { width: 127px; } .z8, .z9 { width: 290px; justify-content: flex-start; padding-left: 20px;} .z10{ width: 317px; font-size: 28px; }
        /* r2 中部左列（与右侧同高） */
        .mid-left {
            width: 662px;
            display: flex;
            align-self: stretch;
            height: 100%;
            min-height: 0;
        }
        .z2 { width: 127px; position: relative; flex-shrink: 0; align-self: stretch; }
        .z3 { width: 535px; position: relative; flex-shrink: 0; align-self: stretch; min-width: 0; }
        /* r2 右侧：2×5 栅格铺满 427×362，避免出现 85×5≠427 的视觉缝隙 */
        .mid-right {
            width: 362px;
            height: 100%;
            align-self: stretch;
            display: grid;
            grid-template-columns: 181px 181px;
            grid-template-rows: repeat(5, 1fr);
        }
        .mid-right > .zone {
            box-sizing: border-box;
            width: 181px;
            min-width: 0;
            min-height: 0;
        }

        .zone.z3 {
            display: flex;
            flex-direction: column;
            padding: 0;
            overflow: hidden;
            min-width: 0;
            min-height: 0;
        }
        #speed-svg {
            display: block;
            flex: 1 1 auto;
            width: 100%;
            min-height: 0;
            max-height: 100%;
            /* 在中间 3 区内略放大仪表（父级 overflow:hidden 裁掉外缘） */
            transform: scale(1.12);
            transform-origin: center center;
            margin-top: -22px;
        }
        .z4 { width: 127px; font-weight: bold; font-size: 28px;} .z5 { width: 171px; } .z6 { width: 259px; } .z7 { width: 105px; } .z21{ width: 181px; } .z22{ width: 181px; }
        .z23{ width: 334px; justify-content: flex-start; align-items: flex-end; padding: 0 0 36px 10px; } .z24{ width: 320px; align-items: flex-start; padding: 25px; } .z25{ width: 370px; padding: 15px; align-items: flex-start; font-size: 20px; line-height: 1.4;} .z13 { width: 181px !important; } .z14 { width: 181px !important; } 

        /* 内部组件 */
        .dist-bar { position: absolute; right: -12px; bottom: 0; width: 10px; background-color: rgb(45, 144, 51); transition: height 0.2s; }
        @keyframes blink { 50% { opacity: 0; } }
        .blinking { animation: blink 1s step-start infinite; }

        /* 控制台样式 */
        .control-panel {
            width: 480px; background-color: #222; border-radius: 8px; padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column;
            gap: 10px; border: 1px solid #444; height: 768px; box-sizing: border-box; overflow-y: auto;
        }
        .control-panel h2 { margin: 0 0 5px 0; font-size: 18px; border-bottom: 2px solid #555; padding-bottom: 5px; color: #fff;}
        .ctrl-group { background: #111; padding: 10px; border-radius: 6px; border: 1px solid #333; }
        .ctrl-group h3 { margin: 0 0 8px 0; font-size: 14px; color: rgb(37, 151, 230); border-bottom: 1px solid #333; padding-bottom: 4px;}
        .ctrl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
        .ctrl-item { display: flex; align-items: center; justify-content: space-between; }
        .ctrl-item label { font-size: 11px; color: #ccc; width: 65px; flex-shrink: 0; }
        .ctrl-item input[type="text"], .ctrl-item select { flex: 1; width: 100%; background: #333; color: white; border: 1px solid #555; padding: 4px; border-radius: 3px; font-size: 12px;}
        .slider-row { display: flex; flex-direction: column; margin-bottom: 5px;}
        .slider-row div { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; color: #ccc;}
        .slider-row input { width: 100%; cursor: pointer;}
        button { background: #444; color: white; border: 1px solid #666; padding: 8px; border-radius: 4px; cursor: pointer; }

        /* 嵌入 metro-simulator：仅 DMI，隐藏调试面板 */
        html.vobc-embed-root, body.vobc-embed {
            height: 100%;
            margin: 0;
            overflow: hidden;
            background-color: rgb(0, 12, 25);
        }
        body.vobc-embed {
            display: block;
            padding: 0;
        }
        body.vobc-embed .simulator {
            gap: 0;
            transform: none;
            transform-origin: top left;
            width: 100%;
            min-height: 0;
        }
        body.vobc-embed #mock-panel { display: none !important; }
        body.vobc-embed .dmi-container {
            transform-origin: top left;
        }
        body.vobc-embed #vobc-embed-wrap {
            margin: 0 auto;
            max-width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>

<script>
    function speedToAngle(val) { return -140 + (val / 110) * 280; }
    function polarToCartesian(cx, cy, r, angleDeg) {
        const rad = (angleDeg - 90) * Math.PI / 180.0;
        return { x: cx + (r * Math.cos(rad)), y: cy + (r * Math.sin(rad)) };
    }
    function describeArc(x, y, r, startAngle, endAngle) {
        const start = polarToCartesian(x, y, r, endAngle);
        const end = polarToCartesian(x, y, r, startAngle);
        const largeArc = endAngle - startAngle <= 180 ? "0" : "1";
        return ["M", start.x, start.y, "A", r, r, 0, largeArc, 0, end.x, end.y].join(" ");
    }

    function initDial() {
        const ticks = document.getElementById('dial-ticks');
        const labels = document.getElementById('dial-labels');
        const cx = 267, cy = 240; 
        for (let i = 0; i <= 110; i += 5) {
            const angle = speedToAngle(i); 
            const rad = (angle - 90) * Math.PI / 180; 
            const isMajor = i % 10 === 0;
            const r1 = 170, r2 = isMajor ? 193 : 186; 
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", cx + r1 * Math.cos(rad)); line.setAttribute("y1", cy + r1 * Math.sin(rad));
            line.setAttribute("x2", cx + r2 * Math.cos(rad)); line.setAttribute("y2", cy + r2 * Math.sin(rad));
            line.setAttribute("stroke-width", isMajor ? 2.5 : 2);
            ticks.appendChild(line);
            if (isMajor) {
                const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                txt.setAttribute("x", cx + 140 * Math.cos(rad)); txt.setAttribute("y", cy + 140 * Math.sin(rad) + 8);
                txt.setAttribute("font-size", "24"); txt.textContent = i; labels.appendChild(txt);
            }
        }
    }
    initDial();

    function clampSpd(n, lo, hi) {
        if (!Number.isFinite(n)) return lo;
        return Math.max(lo, Math.min(hi, n));
    }
    /** 目标距离：整数 m，0～9999（光带刻度仍以 ≤750m 的对数映射饱和） */
    function clampDistM(n) {
        const x = clampSpd(parseFloat(n), 0, 9999);
        return Math.round(x);
    }
    /** 速度类：0.1 km/h 分度 */
    function clampKmh01(n) {
        const x = clampSpd(parseFloat(n), 0, 110);
        return Math.round(x * 10) / 10;
    }
    function syncAllZones() {
        const z1 = document.getElementById('c-z1').value;
        const z2 = clampDistM(document.getElementById('c-z2').value);
        const z2t = clampKmh01(document.getElementById('c-z2-tgt').value);
        const z3s = clampKmh01(document.getElementById('c-z3-spd').value);
        const z3t = clampKmh01(document.getElementById('c-z3-tgt').value);
        const z3e = clampKmh01(document.getElementById('c-z3-eb').value);
        const z4 = document.getElementById('c-z4').value;
        const z5 = document.getElementById('c-z5').value;
        const z6 = document.getElementById('c-z6').value;
        const z7 = document.getElementById('c-z7').value;
        const z8 = document.getElementById('c-z8').value;
        const z9 = document.getElementById('c-z9').value;
        const z10 = document.getElementById('c-z10').value;
        const z11 = document.getElementById('c-z11') ? document.getElementById('c-z11').value : 'none';
        const z13 = document.getElementById('c-z13').value;
        const z14 = document.getElementById('c-z14').value;
        const z15 = document.getElementById('c-z15').value;
        const z16 = document.getElementById('c-z16').value;
        const z17 = document.getElementById('c-z17').value;
        const z18 = document.getElementById('c-z18').value;
        const z19El = document.getElementById('c-z19');
        const z19 = z19El ? z19El.value.trim() : '';
        const z20 = document.getElementById('c-z20').value;
        const z21 = document.getElementById('c-z21').value;
        const z22 = document.getElementById('c-z22').value;
        const z23 = document.getElementById('c-z23').value;
        const z25 = document.getElementById('c-z25').value;

        const hideRecEl = document.getElementById('c-hide-recommend');
        const hideRec = hideRecEl && hideRecEl.value === '1';

        document.getElementById('v-dist').textContent = z2 >= 9000 ? '—' : String(z2);
        document.getElementById('v-z2-tgt').textContent = z2t.toFixed(1);
        document.getElementById('v-spd').textContent = z3s.toFixed(1);
        if (hideRec) {
            document.getElementById('v-tgt').textContent = '—';
        } else {
            document.getElementById('v-tgt').textContent = z3t.toFixed(1);
        }
        document.getElementById('v-eb').textContent = z3e.toFixed(1);

        // 1区 超速报警及紧急制动显示逻辑
        let z1Color = 'transparent'; 
        if (z1 === 'orange') {
            z1Color = 'rgb(234, 145, 0)';       // 手动橙色
        } else if (z1 === 'red') {
            z1Color = 'rgb(189, 0, 0)';         // 手动红色
        }
        document.getElementById('z1-eb').style.backgroundColor = z1Color;
        // 2区上方大字：目标速度 — DMI 仍为 1 km/h 显示
        document.getElementById('z2-tgt').textContent = String(Math.round(z2t));
        if (z2 >= 9000) {
            document.getElementById('z2-dist').innerHTML = '<span style="font-weight:bold;">—</span>米';
        } else {
            document.getElementById('z2-dist').innerHTML = `<span style="font-weight:bold;">${z2}</span>米`;
        }
        
        const z2BandPx = 308;
        if (z2 >= 9000) {
            document.getElementById('z2-bar').style.height = '0px';
            document.getElementById('z2-bar').style.backgroundColor = 'transparent';
        } else {
            const z2Bar = Math.min(z2, 750);
            let logHeight = z2Bar <= 1 ? 0 : (Math.log10(z2Bar) / Math.log10(750)) * z2BandPx;
            document.getElementById('z2-bar').style.height = `${Math.min(z2BandPx, Math.max(0, logHeight))}px`;
            let barColor = 'rgb(45, 144, 51)';
            if (z2Bar >= 150 && z2Bar <= 300) {
                if (z2t < 25) barColor = 'rgb(255, 242, 0)';
            } else if (z2Bar < 150) {
                if (z2t >= 60) barColor = 'rgb(45, 144, 51)';
                else if (z2t > 0 && z2t < 60) barColor = 'rgb(255, 242, 0)';
                else if (z2t < 0.05) barColor = 'rgb(189, 0, 0)';
            }
            document.getElementById('z2-bar').style.backgroundColor = barColor;
        }

        // 3区中央数字：实际速度 — DMI 仍为 1 km/h 显示
        document.getElementById('z3-spd').textContent = String(Math.round(z3s));
        document.getElementById('pointer-group').setAttribute('transform', `rotate(${speedToAngle(z3s)} 267 240)`);
        const tgtTri = document.getElementById('tgt-tri');
        const rowRec = document.getElementById('mock-row-recommend');
        if (hideRec) {
            tgtTri.style.display = 'none';
            if (rowRec) rowRec.style.display = 'none';
        } else {
            tgtTri.style.display = '';
            if (rowRec) rowRec.style.display = '';
            tgtTri.setAttribute('transform', `rotate(${speedToAngle(z3t)} 267 240)`);
        }
        document.getElementById('eb-tri').setAttribute('transform', `rotate(${speedToAngle(z3e)} 267 240)`);
        document.getElementById('red-arc').setAttribute('d', describeArc(267, 240, 190, speedToAngle(z3e), speedToAngle(110)));

        // 4区 牵引/制动状态显示逻辑
        document.getElementById('z4-traction').style.display = (z4 === 'traction') ? 'block' : 'none';
        document.getElementById('z4-coasting').style.display = (z4 === 'coasting') ? 'block' : 'none';
        document.getElementById('z4-braking').style.display = (z4 === 'braking') ? 'block' : 'none';
        document.getElementById('z5-txt').textContent = z5;
        document.getElementById('z6-train-group').setAttribute('fill', z6 === '1' ? 'rgb(45, 144, 51)' : 'rgb(189, 0, 0)');

        const z7T = document.getElementById('z7-top'), z7B = document.getElementById('z7-btm');
        const cG = 'rgb(45,144,51)', cR = 'rgb(189,0,0)', cW = 'rgb(255,255,255)';
        if (z7==='1'){ z7T.setAttribute('fill',cG); z7B.setAttribute('fill',cW); }
        else if (z7==='2'){ z7T.setAttribute('fill',cG); z7B.setAttribute('fill',cR); }
        else { z7T.setAttribute('fill',cR); z7B.setAttribute('fill',cG); }

        // 11区 跳停/扣车状态显示逻辑
        if (document.getElementById('z11-skip')) {
            document.getElementById('z11-skip').style.display = (z11 === 'skip') ? 'block' : 'none';
            document.getElementById('z11-hold').style.display = (z11 === 'hold') ? 'block' : 'none';
        }

        document.getElementById('z8-txt').textContent = z8;
        document.getElementById('z9-txt').textContent = z9;
        document.getElementById('z10-txt').textContent = z10;
        document.getElementById('z13-txt').textContent = z13;
        document.getElementById('z14-txt').textContent = z14;
        
        const z15i = document.getElementById('z15-icon');
        if (z15 === 'none') {
            z15i.style.display = 'none';
            z15i.classList.remove('blinking');
        } else {
            z15i.style.display = 'block';
            const z15Color = z15 === 'blink' ? 'rgb(45, 144, 51)' : 'rgb(255, 242, 0)';
            z15i.querySelectorAll('line').forEach(l => l.setAttribute('stroke', z15Color));
            if (z15 === 'blink') z15i.classList.add('blinking');
            else z15i.classList.remove('blinking');
        }

        const z16i = document.getElementById('z16-icon');
        const z16Train = document.getElementById('z16-train-group');
        if (z16 === 'none') {
            z16i.style.display = 'none';
        } else {
            z16i.style.display = 'block';
            const z16Colors = {
                'platform': 'rgb(189,0,0)',
                'stop-range': 'rgb(255,242,0)',
                'precision': 'rgb(45,144,51)'
            };
            z16Train.setAttribute('fill', z16Colors[z16]);
        }

        const dl = document.getElementById('z17-door-l'), dr = document.getElementById('z17-door-r');
        const al = document.getElementById('z17-arr-l'), ar = document.getElementById('z17-arr-r');
        const bC = 'rgb(0, 12, 25)', yC = 'rgb(255, 242, 0)', gC = 'rgb(45, 144, 51)', wC = 'rgb(255, 255, 255)';
        al.setAttribute('fill', bC); ar.setAttribute('fill', bC); dl.setAttribute('fill', wC); dr.setAttribute('fill', wC);
        switch(z17) {
            case '1': break;
            case '2': al.setAttribute('fill', gC); ar.setAttribute('fill', gC); break;
            case '3': al.setAttribute('fill', gC); break;
            case '4': ar.setAttribute('fill', gC); break;
            case '5': al.setAttribute('fill', gC); dl.setAttribute('fill', yC); dr.setAttribute('fill', yC); break;
            case '6': ar.setAttribute('fill', gC); dl.setAttribute('fill', yC); dr.setAttribute('fill', yC); break;
            case '7': al.setAttribute('fill', gC); ar.setAttribute('fill', gC); dl.setAttribute('fill', yC); dr.setAttribute('fill', yC); break;
            case '8': dl.setAttribute('fill', yC); dr.setAttribute('fill', yC); break;
        }

        // 18区 发车信息显示逻辑
        if (document.getElementById('z18-close')) {
            document.getElementById('z18-close').style.display = (z18 === 'close') ? 'block' : 'none';
            document.getElementById('z18-depart').style.display = (z18 === 'depart') ? 'block' : 'none';
        }
        const z19Txt = document.getElementById('z19-txt');
        if (z19Txt) z19Txt.textContent = z19;
        if (document.getElementById('z20-slip')) {
            const showSlip = z20 === 'slip' || z20 === 'both';
            const showPsd = z20 === 'psd';
            // 规范要求：空转/打滑优先级高于站台门未关闭
            document.getElementById('z20-slip').style.display = showSlip ? 'block' : 'none';
            document.getElementById('z20-psd').style.display = (!showSlip && showPsd) ? 'block' : 'none';
        }
        const z21Icon = document.getElementById('z21-icon');
        const z21Labels = {
            'atp': 'ATP',
            'ato': 'ATO',
            'radio': 'RAD'
        };
        document.getElementById('z21-txt').textContent = z21Labels[z21] || '';
        z21Icon.style.display = z21 === 'none' ? 'none' : 'block';
        const z22Icon = document.getElementById('z22-icon');
        const z22Bracket = document.getElementById('z22-bracket');
        const z22Lost = document.getElementById('z22-lost-frame');
        if (z22 === 'none') {
            z22Icon.style.display = 'none';
        } else {
            z22Icon.style.display = 'block';
            z22Lost.style.display = z22 === 'lost' ? 'block' : 'none';
            z22Bracket.style.display = z22 === 'lost' ? 'none' : 'block';
            const bracketColor = z22 === 'depot' ? 'rgb(255,242,0)' : 'rgb(45,144,51)';
            z22Bracket.querySelectorAll('line').forEach(l => l.setAttribute('stroke', bracketColor));
        }
        if (z23) document.getElementById('z23-txt').textContent = z23;
        document.getElementById('z25-html').innerHTML = z25;
    }

    document.getElementById('mock-panel').addEventListener('input', syncAllZones);
    document.getElementById('mock-panel').addEventListener('change', syncAllZones);

    /* metro-simulator 嵌入：由父页面下发控件值并刷新 DMI */
    (function embedMetro() {
        const p = new URLSearchParams(location.search);
        if (p.get('embed') === '1') {
            document.documentElement.classList.add('vobc-embed-root');
            document.body.classList.add('vobc-embed');
            const dmi = document.getElementById('dmi-main');
            const sim = document.querySelector('.simulator');
            if (dmi && sim && !document.getElementById('vobc-embed-wrap')) {
                const wrap = document.createElement('div');
                wrap.id = 'vobc-embed-wrap';
                wrap.style.overflow = 'hidden';
                wrap.style.margin = '0 auto';
                sim.insertBefore(wrap, dmi);
                wrap.appendChild(dmi);
            }
            const wrap = document.getElementById('vobc-embed-wrap');
            const DMI_NAT_W = 1024;
            const DMI_NAT_H = 768;
            const scale = () => {
                const iw = window.innerWidth || DMI_NAT_W;
                const ih = window.innerHeight || DMI_NAT_H;
                /** iframe 视口与 DMI 同为 4:3（父页 .mmi-dmi-slot）时，contain 可无黑边、无裁切 */
                const s = Math.min(iw / DMI_NAT_W, ih / DMI_NAT_H);
                const inv = 1 - s;
                if (wrap) {
                    wrap.style.width = Math.round(DMI_NAT_W * s) + 'px';
                    wrap.style.height = Math.round(DMI_NAT_H * s) + 'px';
                    wrap.style.overflow = 'hidden';
                    wrap.style.marginLeft = 'auto';
                    wrap.style.marginRight = 'auto';
                }
                if (dmi) {
                    dmi.style.transform = 'scale(' + s + ')';
                    dmi.style.transformOrigin = 'top left';
                    dmi.style.marginBottom = '-' + Math.round(DMI_NAT_H * inv) + 'px';
                    dmi.style.marginRight = '-' + Math.round(DMI_NAT_W * inv) + 'px';
                }
                document.documentElement.style.setProperty('--vobc-dmi-scale', String(s));
            };
            scale();
            window.addEventListener('resize', scale);
        }
        window.addEventListener('message', (e) => {
            if (!e.data || e.data.type !== 'metro-vobc-dmi') return;
            const controls = e.data.controls;
            if (!controls || typeof controls !== 'object') return;
            try {
                for (const [id, val] of Object.entries(controls)) {
                    const el = document.getElementById(id);
                    if (!el || !('value' in el)) continue;
                    el.value = String(val);
                }
            } catch (err) { console.warn('metro-vobc-dmi apply', err); }
            syncAllZones();
        });
    })();
    function formatClockNow() {
        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const hh = String(d.getHours()).padStart(2, '0');
        const mm = String(d.getMinutes()).padStart(2, '0');
        const ss = String(d.getSeconds()).padStart(2, '0');
        return `<span>${y}-${m}-${day}</span><span style="display:inline-block; width:10px;"></span><span>${hh}:${mm}:${ss}</span>`;
    }
    setInterval(() => { if (!document.getElementById('c-z23').value) document.getElementById('z23-txt').innerHTML = formatClockNow(); }, 1000);
    syncAllZones();
</script>
</body>
</html>
